    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { 
            Send, MessageSquare, Stethoscope, Pill, FileText, 
            AlertTriangle, CheckCircle, X, Printer, Download, Share2,
            Mic, MicOff, Loader2
        } = lucideReact;
        
        function MedicalVoiceInput({ onTranscript, disabled }) {
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isSupported, setIsSupported] = useState(true);
            const recognitionRef = useRef(null);
            const finalTranscriptRef = useRef('');
            
            useEffect(() => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    
                    if (!SpeechRecognition) {
                        setIsSupported(false);
                        return;
                    }
                    
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'zh-CN';
                    
                    recognition.onstart = () => {
                        setIsRecording(true);
                        setIsProcessing(false);
                    };
                    
                    recognition.onend = () => {
                        setIsRecording(false);
                        setIsProcessing(false);
                    };
                    
                    recognition.onerror = (event) => {
                        console.error('语音识别错误:', event.error);
                        setIsRecording(false);
                        setIsProcessing(false);
                    };
                    
                    recognition.onresult = (event) => {
                        let interimTranscript = '';
                        let currentFinalTranscript = '';
                        
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcript = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                currentFinalTranscript += transcript;
                            } else {
                                interimTranscript += transcript;
                            }
                        }
                        
                        if (currentFinalTranscript) {
                            finalTranscriptRef.current += currentFinalTranscript;
                            onTranscript(finalTranscriptRef.current, false);
                        } else if (interimTranscript) {
                            onTranscript(finalTranscriptRef.current + interimTranscript, true);
                        }
                    };
                    
                    recognitionRef.current = recognition;
                    
                    return () => {
                        if (recognitionRef.current) {
                            recognitionRef.current.stop();
                        }
                    };
                }
            }, [onTranscript]);
            
            const handleStartRecording = () => {
                if (recognitionRef.current && !isRecording) {
                    finalTranscriptRef.current = '';
                    recognitionRef.current.start();
                }
            };
            
            const handleStopRecording = () => {
                if (recognitionRef.current && isRecording) {
                    recognitionRef.current.stop();
                    setIsProcessing(true);
                    
                    setTimeout(() => {
                        setIsProcessing(false);
                        onTranscript(finalTranscriptRef.current, false, true);
                        finalTranscriptRef.current = '';
                    }, 500);
                }
            };
            
            const handleToggleRecording = () => {
                if (isRecording) {
                    handleStopRecording();
                } else {
                    handleStartRecording();
                }
            };
            
            if (!isSupported) {
                return (
                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px', padding: '12px 16px', fontSize: '14px', color: '#dc2626', background: '#fef2f2', borderRadius: '8px', border: '1px solid #fecaca' }}>
                        <MicOff size={20} style={{ display: 'inline', verticalAlign: 'middle' }} />
                        <span>您的浏览器不支持语音输入</span>
                    </div>
                );
            }
            
            return (
                <button
                    onClick={handleToggleRecording}
                    disabled={disabled || isProcessing}
                    style={{
                        width: '56px',
                        height: '56px',
                        borderRadius: '50%',
                        border: 'none',
                        cursor: 'pointer',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        transition: 'all 0.3s',
                        background: isRecording 
                            ? 'linear-gradient(135deg, #ef4444 0%, #dc2626 100%)' 
                            : 'linear-gradient(135deg, #10b981 0%, #14b8a6 100%)',
                        color: 'white',
                        boxShadow: isRecording 
                            ? '0 4px 12px rgba(239, 68, 68, 0.3)' 
                            : '0 4px 12px rgba(16, 185, 129, 0.3)',
                        animation: isRecording ? 'pulse 1.5s infinite' : 'none',
                        opacity: (disabled || isProcessing) ? 0.5 : 1
                    }}
                    title={isRecording ? '停止录音' : '开始语音输入'}
                >
                    {isProcessing ? (
                        <Loader2 size={24} style={{ animation: 'spin 1s linear infinite' }} />
                    ) : isRecording ? (
                        <MicOff size={24} />
                    ) : (
                        <Mic size={24} />
                    )}
                </button>
            );
        }
        
        function MedicalPharmacyApp() {
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    role: 'assistant',
                    content: '您好！我是您的执业药师助教。我可以为您提供专业的用药指导、药品信息查询和药学知识解答。请点击麦克风按钮开始语音输入，或直接输入您的问题。',
                    type: 'greeting'
                }
            ]);
            const [input, setInput] = useState('');
            const [isVoiceInput, setIsVoiceInput] = useState(false);
            const [showPrescription, setShowPrescription] = useState(false);
            const [currentPrescription, setCurrentPrescription] = useState(null);
            
            const handleTranscript = (text, isInterim, isFinal) => {
                setInput(text);
                setIsVoiceInput(!isFinal);
                
                if (isFinal && text.trim()) {
                    handleSendMessage(text);
                }
            };
            
            const handleSendMessage = (messageText = input) => {
                if (!messageText.trim()) return;
                
                const userMessage = {
                    id: Date.now(),
                    role: 'user',
                    content: messageText
                };
                
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsVoiceInput(false);
                
                setTimeout(() => {
                    const assistantMessage = {
                        id: Date.now() + 1,
                        role: 'assistant',
                        content: generateMedicalResponse(messageText),
                        type: 'medical'
                    };
                    setMessages(prev => [...prev, assistantMessage]);
                }, 1000);
            };
            
            const generateMedicalResponse = (question) => {
                const lowerQuestion = question.toLowerCase();
                
                if (lowerQuestion.includes('阿莫西林') || lowerQuestion.includes('抗生素')) {
                    return `**阿莫西林**（处方药，请遵医嘱）

**适应症**：用于治疗敏感菌引起的各种感染，如呼吸道感染、尿路感染、皮肤软组织感染等。

**用法用量**：
- 成人：通常每次0.5g，每6-8小时一次
- 儿童：按体重计算，通常每日20-40mg/kg，分3-4次服用
- 饭后服用可减少胃肠道反应

**不良反应**：
- 常见：恶心、呕吐、腹泻等胃肠道反应
- 偶见：皮疹、药物热等过敏反应
- 严重：过敏性休克（罕见但危险）

**禁忌症**：
- 青霉素过敏者禁用
- 传染性单核细胞增多症患者禁用

**注意事项**：
- 用药前必须进行青霉素皮试
- 完整疗程治疗，避免过早停药
- 如出现皮疹、呼吸困难等过敏症状，立即停药就医

**重要提醒**：本品为处方药，必须在医师指导下使用，请遵医嘱！`;
                } else if (lowerQuestion.includes('头孢')) {
                    return `**头孢类抗生素**（处方药，请遵医嘱）

头孢类抗生素是一类广谱抗生素，根据抗菌谱和抗菌活性分为五代：

**第一代**：头孢唑林、头孢拉定等，主要用于革兰阳性菌感染
**第二代**：头孢呋辛、头孢克洛等，对革兰阴性菌作用增强
**第三代**：头孢曲松、头孢他啶等，对革兰阴性菌作用更强
**第四代**：头孢吡肟等，广谱抗菌
**第五代**：头孢洛林等，对耐药菌有效

**共同特点**：
- 杀菌作用强
- 过敏反应比青霉素少，但仍需注意
- 与酒精同服可引起双硫仑样反应（严重）

**注意事项**：
- 对青霉素过敏者慎用
- 用药期间及停药后7天内禁止饮酒
- 肾功能不全者需调整剂量

**重要提醒**：头孢类抗生素均为处方药，必须在医师指导下使用，请遵医嘱！`;
                } else if (lowerQuestion.includes('不良反应') || lowerQuestion.includes('副作用')) {
                    return `**药物不良反应（ADR）是指合格药品在正常用法用量下出现的与用药目的无关的有害反应。**

**常见不良反应类型**：

1. **胃肠道反应**
   - 恶心、呕吐、腹泻、腹痛
   - 常见药物：抗生素、NSAIDs等

2. **过敏反应**
   - 皮疹、荨麻疹、瘙痒
   - 严重：过敏性休克
   - 常见药物：青霉素、头孢等

3. **神经系统反应**
   - 头晕、头痛、嗜睡
   - 严重：癫痫发作
   - 常见药物：镇静催眠药、抗癫痫药

4. **肝肾功能损害**
   - 转氨酶升高、黄疸
   - 肌酐升高、蛋白尿
   - 常见药物：某些抗生素、抗肿瘤药

**不良反应处理原则**：
- 轻度反应：继续观察，对症处理
- 中度反应：暂停用药，咨询医师
- 重度反应：立即停药，紧急就医

**报告不良反应**：
如发现可疑不良反应，请及时向医师或药师报告，也可通过国家药品不良反应监测系统上报。`;
                } else if (lowerQuestion.includes('禁忌症')) {
                    return `**药物禁忌症是指禁止使用某种药物的情况。**

**常见禁忌症类型**：

1. **绝对禁忌症**
   - 青霉素过敏者禁用青霉素
   - 严重肝肾功能不全者禁用某些药物
   - 孕妇禁用某些致畸药物

2. **相对禁忌症**
   - 轻中度肝肾功能不全需调整剂量
   - 哺乳期慎用某些药物
   - 老年人需调整剂量

**特殊人群禁忌**：

**孕妇**：
- 禁用：沙利度胺、维甲酸类等致畸药物
- 慎用：大多数药物需权衡利弊

**儿童**：
- 禁用：某些成人药物
- 剂量需按体重或体表面积计算

**老年人**：
- 肝肾功能减退，需调整剂量
- 多种药物联用需注意相互作用

**重要提醒**：用药前请仔细阅读药品说明书中的禁忌症项，如有疑问请咨询医师或药师。`;
                } else {
                    return `感谢您的提问。作为执业药师助教，我将基于临床用药指南为您提供专业的用药指导。

**我可以帮助您解答以下问题**：

1. **药品信息查询**：药品名称、适应症、用法用量等
2. **用药指导**：如何正确服用药物、注意事项等
3. **不良反应**：药物可能的不良反应及处理方法
4. **禁忌症**：哪些情况下不能使用某种药物
5. **药物相互作用**：多种药物同时使用的注意事项
6. **特殊人群用药**：孕妇、儿童、老年人等特殊人群用药指导

**重要提示**：
- 涉及处方药的问题，我会明确标注"请遵医嘱"
- 所有建议均基于权威的临床用药指南
- 如有严重或紧急情况，请立即就医

请告诉我您想了解的具体药品或用药问题，我会为您提供详细的解答。`;
                }
            };
            
            const showPrescriptionPanel = (message) => {
                setCurrentPrescription(message);
                setShowPrescription(true);
            };
            
            return (
                <div className="container">
                    <div className="app-container">
                        <div className="header">
                            <div className="header-content">
                                <div className="header-left">
                                    <div className="header-icon">
                                        <Stethoscope size={32} color="white" />
                                    </div>
                                    <div className="header-title">
                                        <h1>执业药师助教</h1>
                                        <p>专业用药指导 · 药学知识解答</p>
                                    </div>
                                </div>
                                <div className="status-badge">
                                    <CheckCircle size={18} />
                                    <span>在线</span>
                                </div>
                            </div>
                        </div>
                        
                        <div className="main-content">
                            <div className="chat-section">
                                <div className="messages-container">
                                    {messages.map((message) => (
                                        <div key={message.id} className={`message ${message.role}`}>
                                            <div className={`message-avatar ${message.role}`}>
                                                {message.role === 'user' ? (
                                                    <Pill size={20} color="white" />
                                                ) : (
                                                    <Stethoscope size={20} color="white" />
                                                )}
                                            </div>
                                            <div className={`message-content-wrapper ${message.role}`}>
                                                <div className={`message-bubble ${message.role}`}>
                                                    {message.content}
                                                </div>
                                                {message.role === 'assistant' && message.type === 'medical' && (
                                                    <div className="prescription-btn" onClick={() => showPrescriptionPanel(message)}>
                                                        <FileText size={14} />
                                                        查看药品说明书
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                
                                <div className="input-section">
                                    <div className="input-wrapper">
                                        <div className="input-container">
                                            <textarea
                                                value={input}
                                                onChange={(e) => setInput(e.target.value)}
                                                onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendMessage())}
                                                placeholder={isVoiceInput ? '正在识别语音...' : '请输入您的用药问题...'}
                                                disabled={isVoiceInput}
                                                rows={2}
                                                className={`input-field ${isVoiceInput ? 'recording' : ''}`}
                                            />
                                            {isVoiceInput && (
                                                <div className="voice-indicator">
                                                    <span></span>
                                                    <span></span>
                                                    <span></span>
                                                </div>
                                            )}
                                        </div>
                                        
                                        <MedicalVoiceInput 
                                            onTranscript={handleTranscript}
                                            disabled={false}
                                        />
                                        
                                        <button
                                            onClick={() => handleSendMessage()}
                                            disabled={!input.trim() || isVoiceInput}
                                            className="send-button"
                                        >
                                            <Send size={18} />
                                            发送
                                        </button>
                                    </div>
                                    
                                    <div className="info-box">
                                        <h3><AlertTriangle size={16} /> 重要提示</h3>
                                        <ul>
                                            <li>本助教提供的用药指导仅供参考，不能替代专业医师诊断</li>
                                            <li>涉及处方药时，请务必遵医嘱使用</li>
                                            <li>如有严重或紧急情况，请立即就医</li>
                                            <li>所有建议均基于权威的临床用药指南</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                            
                            {showPrescription && currentPrescription && (
                                <div className="prescription-panel active">
                                    <div className="panel-header">
                                        <div className="panel-title">
                                            <FileText size={20} />
                                            药品说明书
                                        </div>
                                        <button className="close-btn" onClick={() => setShowPrescription(false)}>
                                            <X size={24} />
                                        </button>
                                    </div>
                                    
                                    <div className="panel-content">
                                        {currentPrescription.content.split('\n').map((line, index) => {
                                            if (line.startsWith('**')) {
                                                return (
                                                    <div key={index} className="panel-section">
                                                        <h4>
                                                            {line.includes('禁忌') ? (
                                                                <AlertTriangle size={16} style={{ color: '#f59e0b' }} />
                                                            ) : (
                                                                <CheckCircle size={16} style={{ color: '#10b981' }} />
                                                            )}
                                                            {line.replace(/\*\*/g, '').replace('（处方药，请遵医嘱）', '')}
                                                        </h4>
                                                    </div>
                                                );
                                            } else if (line.startsWith('-')) {
                                                return (
                                                    <li key={index}>
                                                        {line.replace(/^- /, '')}
                                                    </li>
                                                );
                                            }
                                            return null;
                                        })}
                                        
                                        <div className="warning-box">
                                            <h4><AlertTriangle size={16} /> 重要提醒</h4>
                                            <p>本说明书仅供参考，不能替代专业医师诊断。涉及处方药时，请务必遵医嘱使用。如有疑问，请咨询医师或药师。</p>
                                        </div>
                                        
                                        <div className="action-buttons">
                                            <button className="action-btn print" onClick={() => alert('打印功能开发中')}>
                                                <Printer size={16} />
                                                打印
                                            </button>
                                            <button className="action-btn download" onClick={() => alert('下载功能开发中')}>
                                                <Download size={16} />
                                                下载
                                            </button>
                                            <button className="action-btn share" onClick={() => alert('分享功能开发中')}>
                                                <Share2 size={16} />
                                                分享
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<MedicalPharmacyApp />);
    </script>
</body>
</html>
