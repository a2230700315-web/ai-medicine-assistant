<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>语音输入演示</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react@0.263.1/dist/umd/lucide-react.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        .chat-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 30px;
            color: white;
        }
        
        .header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }
        
        .header p {
            opacity: 0.9;
            font-size: 14px;
        }
        
        .messages {
            height: 400px;
            overflow-y: auto;
            padding: 20px;
            background: #f8fafc;
        }
        
        .message {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .avatar.assistant {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
        }
        
        .avatar.user {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.6;
        }
        
        .message.assistant .message-content {
            background: white;
            border: 1px solid #e2e8f0;
            color: #1e293b;
        }
        
        .message.user .message-content {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
        }
        
        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e2e8f0;
        }
        
        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .input-container {
            flex: 1;
            position: relative;
        }
        
        .input-field {
            width: 100%;
            padding: 14px 16px;
            padding-right: 50px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .input-field.recording {
            border-color: #3b82f6;
            background: #eff6ff;
        }
        
        .voice-indicator {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            gap: 4px;
        }
        
        .voice-indicator span {
            width: 3px;
            height: 16px;
            background: #3b82f6;
            border-radius: 2px;
            animation: bounce 1s infinite;
        }
        
        .voice-indicator span:nth-child(2) {
            animation-delay: 0.1s;
        }
        
        .voice-indicator span:nth-child(3) {
            animation-delay: 0.2s;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scaleY(1); }
            50% { transform: scaleY(1.5); }
        }
        
        .voice-button {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .voice-button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(59, 130, 246, 0.5);
        }
        
        .voice-button.recording {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
            animation: pulse 1.5s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .voice-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .send-button {
            padding: 14px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .send-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.5);
        }
        
        .send-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .info-box {
            margin-top: 16px;
            padding: 16px;
            background: linear-gradient(135deg, #fef3c7 0%, #fde68a 100%);
            border-radius: 12px;
            border-left: 4px solid #f59e0b;
        }
        
        .info-box h3 {
            color: #92400e;
            font-size: 16px;
            margin-bottom: 8px;
        }
        
        .info-box ul {
            list-style: none;
            color: #78350f;
            font-size: 13px;
        }
        
        .info-box li {
            margin-bottom: 4px;
        }
        
        .unsupported {
            padding: 20px;
            background: #fee2e2;
            border-radius: 12px;
            border-left: 4px solid #ef4444;
            color: #991b1b;
            text-align: center;
        }
        
        .recording-label {
            position: absolute;
            bottom: -24px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #ef4444;
            font-weight: 600;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { Mic, MicOff, Send, MessageSquare, Bot, User } = lucideReact;
        
        function VoiceInput({ onTranscript, disabled }) {
            const [isRecording, setIsRecording] = useState(false);
            const [isProcessing, setIsProcessing] = useState(false);
            const [isSupported, setIsSupported] = useState(true);
            const recognitionRef = useRef(null);
            const finalTranscriptRef = useRef('');
            
            useEffect(() => {
                if (typeof window !== 'undefined') {
                    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                    
                    if (!SpeechRecognition) {
                        setIsSupported(false);
                        return;
                    }
                    
                    const recognition = new SpeechRecognition();
                    recognition.continuous = true;
                    recognition.interimResults = true;
                    recognition.lang = 'zh-CN';
                    
                    recognition.onstart = () => {
                        setIsRecording(true);
                        setIsProcessing(false);
                    };
                    
                    recognition.onend = () => {
                        setIsRecording(false);
                        setIsProcessing(false);
                    };
                    
                    recognition.onerror = (event) => {
                        console.error('语音识别错误:', event.error);
                        setIsRecording(false);
                        setIsProcessing(false);
                    };
                    
                    recognition.onresult = (event) => {
                        let interimTranscript = '';
                        let currentFinalTranscript = '';
                        
                        for (let i = event.resultIndex; i < event.results.length; i++) {
                            const transcript = event.results[i][0].transcript;
                            if (event.results[i].isFinal) {
                                currentFinalTranscript += transcript;
                            } else {
                                interimTranscript += transcript;
                            }
                        }
                        
                        if (currentFinalTranscript) {
                            finalTranscriptRef.current += currentFinalTranscript;
                            onTranscript(finalTranscriptRef.current, false);
                        } else if (interimTranscript) {
                            onTranscript(finalTranscriptRef.current + interimTranscript, true);
                        }
                    };
                    
                    recognitionRef.current = recognition;
                    
                    return () => {
                        if (recognitionRef.current) {
                            recognitionRef.current.stop();
                        }
                    };
                }
            }, [onTranscript]);
            
            const handleStartRecording = () => {
                if (recognitionRef.current && !isRecording) {
                    finalTranscriptRef.current = '';
                    recognitionRef.current.start();
                }
            };
            
            const handleStopRecording = () => {
                if (recognitionRef.current && isRecording) {
                    recognitionRef.current.stop();
                    setIsProcessing(true);
                    
                    setTimeout(() => {
                        setIsProcessing(false);
                        onTranscript(finalTranscriptRef.current, false, true);
                        finalTranscriptRef.current = '';
                    }, 500);
                }
            };
            
            const handleToggleRecording = () => {
                if (isRecording) {
                    handleStopRecording();
                } else {
                    handleStartRecording();
                }
            };
            
            if (!isSupported) {
                return (
                    <div className="unsupported">
                        <MicOff size={20} style={{ display: 'inline', verticalAlign: 'middle' }} />
                        <span style={{ marginLeft: '8px' }}>您的浏览器不支持语音输入</span>
                    </div>
                );
            }
            
            return (
                <div style={{ position: 'relative' }}>
                    <button
                        onClick={handleToggleRecording}
                        disabled={disabled || isProcessing}
                        className={`voice-button ${isRecording ? 'recording' : ''}`}
                        title={isRecording ? '停止录音' : '开始录音'}
                    >
                        {isProcessing ? (
                            <div style={{ width: 20, height: 20, border: '2px solid rgba(255,255,255,0.3)', borderTopColor: 'white', borderRadius: '50%', animation: 'spin 1s linear infinite' }} />
                        ) : isRecording ? (
                            <MicOff size={20} />
                        ) : (
                            <Mic size={20} />
                        )}
                    </button>
                    {isRecording && (
                        <div className="recording-label">录音中...</div>
                    )}
                </div>
            );
        }
        
        function App() {
            const [messages, setMessages] = useState([
                {
                    id: 1,
                    role: 'assistant',
                    content: '您好！我是您的AI助手。您可以点击麦克风按钮开始语音输入，我会将您的语音转换为文字并回复。'
                }
            ]);
            const [input, setInput] = useState('');
            const [isVoiceInput, setIsVoiceInput] = useState(false);
            
            const handleTranscript = (text, isInterim, isFinal) => {
                setInput(text);
                setIsVoiceInput(!isFinal);
                
                if (isFinal && text.trim()) {
                    handleSendMessage(text);
                }
            };
            
            const handleSendMessage = (messageText = input) => {
                if (!messageText.trim()) return;
                
                const userMessage = {
                    id: Date.now(),
                    role: 'user',
                    content: messageText
                };
                
                setMessages(prev => [...prev, userMessage]);
                setInput('');
                setIsVoiceInput(false);
                
                setTimeout(() => {
                    const assistantMessage = {
                        id: Date.now() + 1,
                        role: 'assistant',
                        content: `我收到了您的消息："${messageText}"。这是一个语音输入演示，实际应用中可以连接到豆包API进行智能对话。`
                    };
                    setMessages(prev => [...prev, assistantMessage]);
                }, 1000);
            };
            
            return (
                <div className="container">
                    <div className="chat-container">
                        <div className="header">
                            <h1>语音输入演示</h1>
                            <p>使用浏览器原生语音识别功能</p>
                        </div>
                        
                        <div className="messages">
                            {messages.map((message) => (
                                <div key={message.id} className={`message ${message.role}`}>
                                    <div className={`avatar ${message.role}`}>
                                        {message.role === 'user' ? (
                                            <User size={20} color="white" />
                                        ) : (
                                            <Bot size={20} color="white" />
                                        )}
                                    </div>
                                    <div className="message-content">
                                        {message.content}
                                    </div>
                                </div>
                            ))}
                        </div>
                        
                        <div className="input-area">
                            <div className="input-wrapper">
                                <div className="input-container">
                                    <input
                                        type="text"
                                        value={input}
                                        onChange={(e) => setInput(e.target.value)}
                                        onKeyPress={(e) => e.key === 'Enter' && handleSendMessage()}
                                        placeholder={isVoiceInput ? '正在识别语音...' : '输入您的回复...'}
                                        disabled={isVoiceInput}
                                        className={`input-field ${isVoiceInput ? 'recording' : ''}`}
                                    />
                                    {isVoiceInput && (
                                        <div className="voice-indicator">
                                            <span></span>
                                            <span></span>
                                            <span></span>
                                        </div>
                                    )}
                                </div>
                                
                                <VoiceInput 
                                    onTranscript={handleTranscript}
                                    disabled={false}
                                />
                                
                                <button
                                    onClick={() => handleSendMessage()}
                                    disabled={!input.trim() || isVoiceInput}
                                    className="send-button"
                                >
                                    发送
                                </button>
                            </div>
                            
                            <div className="info-box">
                                <h3>使用说明</h3>
                                <ul>
                                    <li>• 点击蓝色麦克风按钮开始录音</li>
                                    <li>• 说话时会实时显示识别结果</li>
                                    <li>• 再次点击按钮停止录音并提交</li>
                                    <li>• 支持中文语音识别</li>
                                    <li>• 需要浏览器支持 Web Speech API（推荐使用 Chrome）</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }
        
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
